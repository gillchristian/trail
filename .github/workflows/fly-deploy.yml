# Fly deploy for the **gateway** system (fly app `cadence`).
#
# NOTE: deploys are MANUAL today (no active auto-deploy). This workflow is moved into
# the monorepo for completeness and kept correct for if/when CI deploy is wired. To
# enable it, set the `FLY_API_TOKEN` repo secret (a "when you wire CI" prerequisite,
# not a migration blocker). See systems/gateway/knowledge/README.md → Deploy.
#
# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy (gateway)
on:
  # Deploys are MANUAL today, so this is dispatch-only — run it from the Actions tab
  # when you want a CI deploy. It will not auto-run (no failing tokenless runs on every
  # gateway push). When you wire auto-deploy: set the FLY_API_TOKEN repo secret and
  # switch to the push trigger below (server-only path filter):
  #   push:
  #     branches: [master]
  #     paths: ['systems/gateway/**']
  workflow_dispatch:
jobs:
  deploy:
    name: Deploy gateway
    runs-on: ubuntu-latest
    concurrency: deploy-group    # ensure only one deploy runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --local-only
        working-directory: systems/gateway
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
